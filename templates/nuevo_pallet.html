{% extends 'base.html' %}{% block content %}
<div class="card shadow p-4"><h3>Ingresar Pallet</h3><form method="POST">
<input type="text" name="codigo_qr" class="form-control mb-2" placeholder="QR" required>
<select name="id_proveedor" class="form-select mb-2">{% for p in proveedores %}<option value="{{ p[0] }}">{{ p[1] }}</option>{% endfor %}</select>
<select name="id_producto" class="form-select mb-2">{% for prod in productos %}<option value="{{ prod[0] }}">{{ prod[2] }}</option>{% endfor %}</select>
<input type="number" name="cantidad" class="form-control mb-2" placeholder="Cantidad" required>
<select name="id_ubicacion" class="form-select mb-2">{% for u in ubicaciones %}<option value="{{ u[0] }}">{{ u[1] }}-{{ u[2] }}-{{ u[3] }}</option>{% endfor %}</select>
<button type="submit" class="btn btn-primary w-100">Registrar</button></form></div>{% endblock %}
