{% extends 'base.html' %}
{% block content %}
<div class="card shadow mx-auto" style="max-width: 500px;">
    <div class="card-body">
        <h2 class="card-title mb-4">Agregar Nuevo Producto</h2>
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Código:</label>
                <input type="text" name="codigo" class="form-control" placeholder="Ej: PROD001" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Nombre:</label>
                <input type="text" name="nombre" class="form-control" placeholder="Nombre del producto" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Unidad:</label>
                <input type="text" name="unidad" class="form-control" placeholder="Ej: KG, Unid, Litros" required>
            </div>
            <button type="submit" class="btn btn-success w-100">Guardar Producto</button>
            <a href="/productos" class="btn btn-secondary w-100 mt-2">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
