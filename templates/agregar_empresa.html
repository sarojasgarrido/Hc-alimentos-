{% extends 'base.html' %}
{% block content %}
<div class="card shadow mx-auto" style="max-width: 500px;">
    <div class="card-body">
        <h2 class="card-title mb-4">Agregar Nueva Empresa</h2>
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Nombre de la Empresa:</label>
                <input type="text" name="nombre" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">RUT:</label>
                <input type="text" name="rut" class="form-control" placeholder="Ej: 12.345.678-9" required>
            </div>
            <div class="mb-3 form-check">
                <input type="checkbox" name="es_proveedor" class="form-check-input" id="checkProv">
                <label class="form-check-label" for="checkProv">Es Proveedor</label>
            </div>
            <div class="mb-3 form-check">
                <input type="checkbox" name="es_cliente" class="form-check-input" id="checkCli">
                <label class="form-check-label" for="checkCli">Es Cliente</label>
            </div>
            <button type="submit" class="btn btn-success w-100">Guardar Empresa</button>
            <a href="/empresas" class="btn btn-secondary w-100 mt-2">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
