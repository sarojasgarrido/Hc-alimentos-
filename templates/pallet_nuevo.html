{% extends "base.html" %}
{% block titulo %}Ingresar Pallet{% endblock %}
{% block contenido %}
<h2>Recepción e Ingreso de Pallets (Asignación Caótica)</h2>

<div class="form-box" style="max-width: 650px;">
    <form method="POST" action="{{ url_for('pallet_nuevo') }}">
        
        <label>Proveedor</label>
        <select name="id_proveedor" required>
            <option value="">Selecciona un proveedor</option>
            {% for prov in proveedores %}
            <option value="{{ prov.id_proveedor }}">{{ prov.nombre }}</option>
            {% endfor %}
        </select>

        <label>N de factura</label>
        <input type="text" name="factura">

        <h3 style="margin-top:20px;">Productos en este pallet</h3>
        <div id="filas-productos" style="background:#fcfcfc; padding:15px; border:1px solid #ddd; border-radius:6px;">
            <div class="fila-producto" style="margin-bottom:15px;">
                <label>Producto</label>
                <select name="id_producto[]" required>
                    <option value="">Selecciona un producto</option>
                    {% for prod in productos %}
                    <option value="{{ prod.id_producto }}">{{ prod.nombre }}</option>
                    {% endfor %}
                </select>

                <label>Cantidad</label>
                <input type="number" name="cantidad[]" min="1" placeholder="Ej: 96">

                <label>Fecha de elaboracion</label>
                <input type="date" name="fecha_elaboracion[]">

                <label>Fecha de vencimiento</label>
                <input type="date" name="fecha_vencimiento[]">

                <button type="button" onclick="this.parentElement.remove()" style="background-color:#C8311F; color:white; padding:6px 12px; border:none; border-radius:4px; font-size:12px; cursor:pointer;">Quitar producto</button>
                <hr style="border:none; border-top:1px dashed #ccc; margin-top:15px;">
            </div>
        </div>

        <button type="button" onclick="agregarFila()" style="background-color:#8C2E1F; margin-top:10px; font-size:13px; padding:8px 12px;">+ Agregar otro producto</button>
        <br><br>
        
        <button type="submit" style="width: 100%; font-size: 16px; padding: 14px;">Registrar pallet</button>
    </form>
</div>

<script>
    function agregarFila() {
        const contenedor = document.getElementById('filas-productos');
        const filaOriginal = contenedor.querySelector('.fila-producto');
        if (!filaOriginal) {
            alert('Agregue un producto antes de clonar');
            return;
        }
        const nuevaFila = filaOriginal.cloneNode(true);
        // Limpiamos los inputs de la fila clonada
        nuevaFila.querySelectorAll('input').forEach(input => input.value = '');
        nuevaFila.querySelectorAll('select').forEach(select => select.selectedIndex = 0);
        contenedor.appendChild(nuevaFila);
    }
</script>
{% endblock %}
