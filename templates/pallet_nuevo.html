<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nuevo Pallet - HC Alimentos</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .row { display: flex; gap: 10px; margin-bottom: 10px; border-bottom: 1px solid #ccc; padding: 10px; }
        #reader { width: 300px; height: 300px; margin: 10px 0; }
    </style>
</head>
<body>
    <h1>Ingreso de Nuevo Pallet</h1>

    <div id="reader"></div>
    
    <form method="POST">
        <label>Proveedor:</label>
        <select name="id_proveedor" required>
            {% for prov in proveedores %}
            <option value="{{ prov[0] }}">{{ prov[1] }}</option>
            {% endfor %}
        </select>

        <label>Factura/Guía:</label>
        <input type="text" name="factura" placeholder="N° Factura">

        <label>Código QR Escaneado:</label>
        <input type="text" id="codigo_qr" name="codigo_qr" required readonly>

        <h3>Productos</h3>
        <div id="contenedor-productos">
            <div class="row">
                <select name="id_producto[]">
                    {% for prod in productos %}
                    <option value="{{ prod[0] }}">{{ prod[1] }}</option>
                    {% endfor %}
                </select>
                <input type="number" name="cantidad[]" placeholder="Cant" required>
                <input type="date" name="fecha_elaboracion[]" placeholder="Elab">
                <input type="date" name="fecha_vencimiento[]" placeholder="Venc">
            </div>
        </div>
        
        <button type="button" onclick="agregarFila()">+ Agregar Producto</button>
        <br><br>
        <button type="submit" style="background: green; color: white;">Guardar Pallet</button>
    </form>

    <script>
        // Lógica QR
        function onScanSuccess(decodedText) {
            document.getElementById('codigo_qr').value = decodedText;
        }
        let html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
        html5QrcodeScanner.render(onScanSuccess);

        // Lógica agregar fila dinámica
        function agregarFila() {
            const contenedor = document.getElementById('contenedor-productos');
            const fila = document.querySelector('.row').cloneNode(true);
            contenedor.appendChild(fila);
        }
    </script>
</body>
</html>
