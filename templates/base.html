<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block titulo %}HC Alimentos - Bodega{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --rojo-marca: #C8311F;
            --rojo-oscuro: #A4291A;
            --terracota: #C77F3D;
            --terracota-oscuro: #AD6A2F;
            --crema: #FAF6EF;
            --crema-card: #FFFFFF;
            --carbon: #2D2925;
            --gris-texto: #5C564E;
            --gris-borde: #E6DDCF;
            --verde-ok: #4B7A4E;
            --rojo-suave-bg: #FBE9E5;
            --rojo-suave-texto: #8C2E1F;
            --verde-suave-bg: #E8F0E5;
            --verde-suave-texto: #3C6B3F;
        }
        * { box-sizing: border-box; }
        body { font-family: 'Inter', Arial, sans-serif; background-color: var(--crema); color: var(--carbon); margin: 0; }
        header { background-color: var(--rojo-marca); color: white; padding: 16px 32px; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
        .marca { font-size: 20px; font-weight: 700; font-family: 'Poppins'; }
        nav { display: flex; gap: 4px; }
        nav a { color: white; text-decoration: none; font-weight: 500; font-size: 14px; padding: 8px 12px; border-radius: 6px; }
        nav a:hover { background-color: rgba(255,255,255,0.15); }
        .usuario-box { display: flex; align-items: center; gap: 12px; font-size: 14px; }
        .salir { background-color: var(--terracota); padding: 8px 14px; border-radius: 6px; color: white; text-decoration: none; }
        main { padding: 32px; max-width: 1100px; margin: 0 auto; }
    </style>
</head>
<body>
    <header>
        <div class="marca">HC <span>Alimentos</span> &middot; Bodega</div>
        <nav>
            <a href="{{ url_for('dashboard') }}">Panel</a>
            <a href="{{ url_for('buscar_pallets') }}">Buscar Pallets</a>
            <!-- Se eliminaron las rutas inexistentes para evitar errores 500 -->
            {% if session.get('rol') == 'Administrador' %}
            <a href="{{ url_for('usuarios') }}">Usuarios</a>
            {% endif %}
        </nav>
        <div class="usuario-box">
            <span>{{ session.get('usuario') }} &middot; {{ session.get('rol') }}</span>
            <a class="salir" href="{{ url_for('logout') }}">Cerrar sesión</a>
        </div>
    </header>
    <main>
        {% block contenido %}{% endblock %}
    </main>
</body>
</html>
