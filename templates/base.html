<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block titulo %}HC Alimentos - Bodega{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --rojo-marca: #C8311F;
            --rojo-oscuro: #A4291A;
            --terracota: #C77F3D;
            --terracota-oscuro: #AD6A2F;
            --crema: #FAF6EF;
            --crema-card: #FFFFFF;
            --carbon: #2D2925;
            --gris-texto: #5C564E;
            --gris-borde: #E6DDCF;
            --verde-ok: #4B7A4E;
            --rojo-suave-bg: #FBE9E5;
            --rojo-suave-texto: #8C2E1F;
            --verde-suave-bg: #E8F0E5;
            --verde-suave-texto: #3C6B3F;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', Arial, sans-serif;
            background-color: var(--crema);
            color: var(--carbon);
            margin: 0;
        }

        h1, h2, h3, .marca {
            font-family: 'Poppins', Arial, sans-serif;
        }

        header {
            background-color: var(--rojo-marca);
            color: white;
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .marca {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 0.3px;
        }
        .marca span {
            font-style: italic;
            font-weight: 600;
            opacity: 0.92;
        }

        nav {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }
        nav a {
            color: white;
            text-decoration: none;
            font-weight: 500;
            font-size: 14px;
            padding: 8px 12px;
            border-radius: 6px;
            opacity: 0.92;
        }
        nav a:hover {
            background-color: rgba(255,255,255,0.15);
            opacity: 1;
        }

        .usuario-box {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
        }

        .salir {
            background-color: var(--terracota);
            color: white;
            text-decoration: none;
            padding: 8px 14px;
            border-radius: 6px;
            font-weight: 500;
            font-size: 14px;
        }
        .salir:hover {
            background-color: var(--terracota-oscuro);
        }

        main {
            padding: 32px;
            max-width: 1100px;
            margin: 0 auto;
        }

        h2 {
            font-weight: 600;
            font-size: 22px;
            margin-bottom: 18px;
            color: var(--carbon);
        }
        h3 {
            font-weight: 600;
            font-size: 16px;
            color: var(--carbon);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--crema-card);
            margin-top: 15px;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 1px 3px rgba(45,41,37,0.08);
        }
        th, td {
            border-bottom: 1px solid var(--gris-borde);
            padding: 11px 14px;
            text-align: left;
            font-size: 14px;
        }
        th {
            background-color: var(--rojo-marca);
            color: white;
            font-weight: 600;
            font-size: 12.5px;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }
        tr:last-child td {
            border-bottom: none;
        }
        tr:hover td {
            background-color: #FBF8F2;
        }

        .form-box {
            background: var(--crema-card);
            padding: 24px;
            border-radius: 12px;
            max-width: 520px;
            box-shadow: 0 1px 4px rgba(45,41,37,0.10);
            border: 1px solid var(--gris-borde);
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--gris-texto);
            margin-bottom: 4px;
            margin-top: 10px;
        }

        .form-box input, .form-box select {
            width: 100%;
            padding: 9px 10px;
            margin-bottom: 6px;
            box-sizing: border-box;
            border: 1px solid var(--gris-borde);
            border-radius: 7px;
            font-family: 'Inter', Arial, sans-serif;
            font-size: 14px;
            background-color: #FFFDFA;
        }
        .form-box input:focus, .form-box select:focus {
            outline: none;
            border-color: var(--rojo-marca);
        }

        .form-box button, button {
            padding: 10px 18px;
            background-color: var(--rojo-marca);
            color: white;
            border: none;
            border-radius: 7px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            font-family: 'Inter', Arial, sans-serif;
        }
        .form-box button:hover, button:hover {
            background-color: var(--rojo-oscuro);
        }

        .accion-editar, .accion-eliminar {
            margin-right: 10px;
            text-decoration: none;
            font-weight: 600;
            font-size: 13px;
        }
        .accion-editar {
            color: var(--terracota-oscuro);
        }
        .accion-eliminar {
            color: var(--rojo-suave-texto);
        }

        .mensaje {
            background-color: var(--verde-suave-bg);
            color: var(--verde-suave-texto);
            padding: 11px 14px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12.5px;
            font-weight: 600;
        }
        .badge-activo { background-color: var(--verde-suave-bg); color: var(--verde-suave-texto); }
        .badge-picking { background-color: #FCEFE2; color: var(--terracota-oscuro); }
        .badge-consumido { background-color: #EFEAE3; color: var(--gris-texto); }

        .tarjetas {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 28px;
        }
        .tarjeta {
            background: var(--crema-card);
            border: 1px solid var(--gris-borde);
            border-radius: 12px;
            padding: 18px 22px;
            flex: 1;
            min-width: 170px;
            box-shadow: 0 1px 4px rgba(45,41,37,0.08);
        }
        .tarjeta .numero {
            font-family: 'Poppins', Arial, sans-serif;
            font-size: 30px;
            font-weight: 700;
            color: var(--rojo-marca);
            line-height: 1.1;
        }
        .tarjeta .etiqueta {
            font-size: 13px;
            color: var(--gris-texto);
            margin-top: 4px;
        }
        .fila-vencido td {
            background-color: #FBE9E5 !important;
        }
        .fila-proximo td {
            background-color: #FCEFE2 !important;
        }
        .scroll-box {
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid var(--gris-borde);
            border-radius: 10px;
            margin-top: 8px;
        }
        .scroll-box table {
            margin-top: 0;
            border-radius: 0;
            box-shadow: none;
            border: none;
        }
        .scroll-box th {
            position: sticky;
            top: 0;
            z-index: 1;
        }

        a {
            color: var(--rojo-marca);
        }

        /* --- Menu con desplegables --- */
        .menu-grupo {
            position: relative;
        }
        .menu-boton {
            color: white;
            background: transparent;
            border: none;
            font-family: 'Inter', Arial, sans-serif;
            font-weight: 500;
            font-size: 14px;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            opacity: 0.92;
        }
        .menu-boton:hover {
            background-color: rgba(255,255,255,0.15);
            opacity: 1;
        }
        .menu-boton .flecha {
            font-size: 10px;
            margin-top: 2px;
        }
        .menu-panel {
            position: absolute;
            top: calc(100% + 4px);
            left: 0;
            background: white;
            color: var(--carbon);
            border-radius: 8px;
            box-shadow: 0 4px 18px rgba(45,41,37,0.18);
            min-width: 210px;
            padding: 6px;
            z-index: 100;
            display: none;
        }
        .menu-grupo.abierto .menu-panel {
            display: block;
        }
        .menu-panel a {
            display: block;
            padding: 9px 14px;
            color: var(--carbon);
            text-decoration: none;
            border-radius: 5px;
            font-size: 13.5px;
            font-weight: 500;
        }
        .menu-panel a:hover {
            background-color: #FCEFE2;
            color: var(--rojo-marca);
        }
    </style>
</head>
<body>
    <header>
        <div class="marca">HC <span>Alimentos</span> &middot; Bodega</div>
        <nav>
            <a href="{{ url_for('dashboard') }}">Panel</a>

            <div class="menu-grupo" id="menu-operaciones">
                <button type="button" class="menu-boton" onclick="toggleMenu('menu-operaciones')">
                    Operaciones <span class="flecha">&#9660;</span>
                </button>
                <div class="menu-panel">
                    <a href="{{ url_for('nuevo_pallet') }}">Ingresar Pallet</a>
                    <a href="{{ url_for('consulta_pallet') }}">Consultar Pallet</a>
                    <a href="{{ url_for('buscar_pallets') }}">Buscar Pallets</a>
                    <a href="{{ url_for('picking') }}">Picking / Despacho</a>
                </div>
            </div>

            <div class="menu-grupo" id="menu-configuracion">
                <button type="button" class="menu-boton" onclick="toggleMenu('menu-configuracion')">
                    Configuracion <span class="flecha">&#9660;</span>
                </button>
                <div class="menu-panel">
                    <a href="{{ url_for('productos') }}">Productos</a>
                    <a href="{{ url_for('empresas') }}">Empresas</a>
                    {% if session.get('rol') == 'Administrador' %}
                    <a href="{{ url_for('usuarios') }}">Usuarios</a>
                    {% endif %}
                </div>
            </div>
        </nav>
        <div class="usuario-box">
            <span>{{ session.get('nombre') }} &middot; {{ session.get('rol') }}</span>
            <a class="salir" href="{{ url_for('logout') }}">Cerrar sesion</a>
        </div>
    </header>

    <script>
        function toggleMenu(id) {
            const grupo = document.getElementById(id);
            const estabaAbierto = grupo.classList.contains('abierto');
            // Cerrar todos los menus primero
            document.querySelectorAll('.menu-grupo').forEach(g => g.classList.remove('abierto'));
            // Si no estaba abierto, abrirlo
            if (!estabaAbierto) grupo.classList.add('abierto');
        }
        // Cerrar al hacer clic fuera
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.menu-grupo')) {
                document.querySelectorAll('.menu-grupo').forEach(g => g.classList.remove('abierto'));
            }
        });
    </script>

    <main>
        {% block contenido %}{% endblock %}
    </main>
</body>
</html>
