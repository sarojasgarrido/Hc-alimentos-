{% extends "base.html" %}
{% block titulo %}Picking de Bodega{% endblock %}
{% block contenido %}
<h2>Operación de Picking</h2>
<div class="form-box" style="max-width: 600px; margin: 0 auto;">
    <form method="POST" action="{{ url_for('picking') }}">
        <label>Escanear QR del Pallet (Origen en Rack)</label>
        <input type="text" name="codigo_qr" required placeholder="Ej: QR-HC-XXXX" autofocus>
        
        <label>Cantidad a extraer (Cajas)</label>
        <input type="number" name="cantidad" required min="1" placeholder="Ej: 5">
        
        <label>Ubicación de Destino (Zona de Piso P1-P12)</label>
        <select name="destino" required>
            {% for i in range(1, 13) %}
            <option value="P{{ i }}">Posición Piso P{{ i }}</option>
            {% endfor %}
        </select>
        
        <button type="submit" style="width: 100%; margin-top: 20px; background-color: var(--terracota);">
            Confirmar Picking a Piso
        </button>
    </form>
</div>
{% endblock %}
