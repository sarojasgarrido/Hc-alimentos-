{% extends "base.html" %}
{% block titulo %}Editar empresa{% endblock %}
{% block contenido %}
    <h2>Editar empresa</h2>
    {% if error %}
        <p style="background-color:#FBE9E5; color:#8C2E1F; padding:11px 14px; border-radius:8px; margin-bottom:15px; font-size:14px; max-width:560px;">{{ error }}</p>
    {% endif %}
    <div class="form-box" style="max-width:560px;">
        <form method="POST">
            <input type="text" name="nombre" value="{{ empresa.nombre }}" placeholder="Nombre" required>
            <input type="text" name="rut" value="{{ empresa.rut or '' }}" placeholder="RUT">
            <input type="text" name="telefono" value="{{ empresa.telefono or '' }}" placeholder="Telefono">
            <input type="text" name="correo" value="{{ empresa.correo or '' }}" placeholder="Correo">
            <input type="text" name="direccion" value="{{ empresa.direccion or '' }}" placeholder="Direccion">
            <label style="margin-top:12px;">
                <input type="checkbox" name="es_proveedor" {% if empresa.es_proveedor %}checked{% endif %} style="width:auto;"> Es proveedor
            </label>
            <label>
                <input type="checkbox" name="es_cliente" {% if empresa.es_cliente %}checked{% endif %} style="width:auto;"> Es cliente
            </label>
            <label>
                <input type="checkbox" name="activo" {% if empresa.activo %}checked{% endif %} style="width:auto;"> Activo
            </label>
            <br><br>
            <button type="submit">Guardar cambios</button>
        </form>
    </div>
    <p><a href="{{ url_for('empresas') }}">Volver al listado</a></p>
{% endblock %}
