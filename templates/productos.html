{% extends 'base.html' %}{% block content %}
<div class="d-flex justify-content-between mb-3"><h2>Productos</h2><a href="/agregar_producto" class="btn btn-success">+ Producto</a></div>
<table class="table table-hover border">
    <thead class="table-dark"><tr><th>Código</th><th>Nombre</th><th>Unidad</th><th>Acción</th></tr></thead>
    <tbody>{% for p in productos %}<tr><td>{{ p[1] }}</td><td>{{ p[2] }}</td><td>{{ p[3] }}</td><td><a href="/eliminar_producto/{{ p[0] }}" class="btn btn-danger btn-sm">Eliminar</a></td></tr>{% endfor %}</tbody>
</table>{% endblock %}
