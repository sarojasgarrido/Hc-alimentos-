{% extends "base.html" %}
{% block titulo %}Editar producto{% endblock %}
{% block contenido %}
    <h2>Editar producto</h2>
    {% if error %}
        <p style="background-color:#FBE9E5; color:#8C2E1F; padding:11px 14px; border-radius:8px; margin-bottom:15px; font-size:14px; max-width:520px;">{{ error }}</p>
    {% endif %}
    <div class="form-box">
        <form method="POST">
            <input type="text" name="codigo" value="{{ producto.codigo or '' }}" placeholder="Codigo">
            <input type="text" name="nombre" value="{{ producto.nombre }}" placeholder="Nombre" required>
            <input type="text" name="unidad" value="{{ producto.unidad or '' }}" placeholder="Unidad">
            <label>
                <input type="checkbox" name="activo" {% if producto.activo %}checked{% endif %} style="width:auto;">
                Activo
            </label>
            <br><br>
            <button type="submit">Guardar cambios</button>
        </form>
    </div>
    <p><a href="{{ url_for('productos') }}">Volver al listado</a></p>
{% endblock %}
